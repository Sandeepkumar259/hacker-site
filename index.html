<!DOCTYPE html>
<html>
<head>
  <title>Ultimate Hacker System</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff00;
      font-family: monospace;
      overflow: hidden;
      text-shadow: 0 0 5px #00ff00;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    #container {
      display: flex;
    }

    #terminal {
      width: 70%;
      height: 80vh;
      overflow-y: auto;
      padding: 20px;
      border-right: 1px solid #00ff00;
    }

    #sidePanel {
      width: 30%;
      padding: 20px;
    }

    .box {
      border: 1px solid #00ff00;
      margin-bottom: 15px;
      padding: 10px;
      box-shadow: 0 0 10px #00ff00;
    }

    #progress {
      width: 100%;
      height: 15px;
      border: 1px solid #00ff00;
    }

    #bar {
      height: 100%;
      width: 0%;
      background: #00ff00;
    }

    .alert { color: red; }
    .success { color: lime; }

    .popup {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 30px;
      font-size: 28px;
      border: 2px solid;
      display: none;
      z-index: 999;
      box-shadow: 0 0 30px;
    }

    #granted {
      color: lime;
      border-color: lime;
      box-shadow: 0 0 30px lime;
    }

    #denied {
      color: red;
      border-color: red;
      box-shadow: 0 0 30px red;
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<h3 style="padding:10px;">🔓 CYBER ACCESS SYSTEM</h3>

<div id="container">
  <div id="terminal"></div>

  <div id="sidePanel">
    <div class="box"><b>CPU Usage</b><div id="cpu">0%</div></div>
    <div class="box"><b>Network</b><div id="network">Connecting...</div></div>
    <div class="box"><b>Password Cracking</b><div id="password">******</div></div>
    <div class="box"><b>Progress</b><div id="progress"><div id="bar"></div></div></div>
  </div>
</div>

<!-- 🔥 POPUPS -->
<div id="granted" class="popup">ACCESS GRANTED ✅</div>
<div id="denied" class="popup">ACCESS DENIED ❌</div>

<!-- 🔊 AUDIO -->
<audio id="typeSound" src="https://www.soundjay.com/mechanical/keyboard-1.mp3"></audio>
<audio id="alertSound" src="https://www.soundjay.com/button/beep-07.mp3"></audio>

<script>
  const typeSound = document.getElementById("typeSound");
  const alertSound = document.getElementById("alertSound");

  // 🔊 enable sound after click (browser rule)
  document.body.addEventListener("click", () => {
    typeSound.play().then(()=>typeSound.pause());
  }, { once: true });

  // MATRIX
  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");

  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;

  const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const fontSize = 14;
  const columns = canvas.width / fontSize;
  const drops = Array(Math.floor(columns)).fill(1);

  function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#0F0";
    ctx.font = fontSize + "px monospace";

    drops.forEach((y, i) => {
      const text = letters[Math.floor(Math.random() * letters.length)];
      ctx.fillText(text, i * fontSize, y * fontSize);

      if (y * fontSize > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i]++;
    });
  }
  setInterval(drawMatrix, 33);

  // TERMINAL
  const terminal = document.getElementById("terminal");

  const logs = [
    "[INFO] Initializing system...",
    "[INFO] Connecting to server...",
    "[SUCCESS] Connected",
    "[WARNING] Firewall detected",
    "[INFO] Bypassing...",
    "[ERROR] Access denied",
    "[SUCCESS] Access granted",
    "[INFO] Extracting data...",
    "[INFO] Uploading payload..."
  ];

  function randomLog() {
    return logs[Math.floor(Math.random() * logs.length)];
  }

  function runTerminal() {
    let line = randomLog();

    if (line.includes("ERROR")) {
      terminal.innerHTML += "<span class='alert'>" + line + "</span>\n";
    } else if (line.includes("SUCCESS")) {
      terminal.innerHTML += "<span class='success'>" + line + "</span>\n";
    } else {
      terminal.innerHTML += line + "\n";
    }

    if (terminal.innerHTML.length > 10000) {
      terminal.innerHTML = terminal.innerHTML.slice(3000);
    }

    terminal.scrollTop = terminal.scrollHeight;

    // 🔊 typing sound
    typeSound.currentTime = 0;
    typeSound.play();

    setTimeout(runTerminal, Math.random() * 200 + 50);
  }

  // CPU
  setInterval(() => {
    document.getElementById("cpu").innerText = Math.floor(Math.random()*100)+"%";
  }, 1000);

  // NETWORK
  setInterval(() => {
    const states = ["Connected","Secure","Encrypted","Transmitting"];
    document.getElementById("network").innerText =
      states[Math.floor(Math.random()*states.length)];
  }, 1500);

  // PASSWORD
  setInterval(() => {
    let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let pass="";
    for(let i=0;i<8;i++){
      pass+=chars[Math.floor(Math.random()*chars.length)];
    }
    document.getElementById("password").innerText=pass;
  },200);

  // PROGRESS BAR
  function moveBar() {
    const bar = document.getElementById("bar");
    let width = 0;

    function fill() {
      if (width < 100) {
        width++;
        bar.style.width = width + "%";
        setTimeout(fill, 30);
      } else {
        width = 0;
        bar.style.width = "0%";
        setTimeout(fill, 500);
      }
    }
    fill();
  }

  // POPUPS
  function randomPopup() {
    const chance = Math.random();
    if (chance < 0.5) {
      showPopup("granted");
    } else {
      showPopup("denied");
    }
  }

  function showPopup(id) {
    const el = document.getElementById(id);
    el.style.display = "block";

    // 🔊 alert sound
    alertSound.currentTime = 0;
    alertSound.play();

    setTimeout(() => {
      el.style.display = "none";
    }, 2000);
  }

  setInterval(randomPopup, 5000);

  // START
  window.onload = function () {
    runTerminal();
    moveBar();
  };
</script>

</body>
</html>
